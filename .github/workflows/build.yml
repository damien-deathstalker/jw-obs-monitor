# This workflow triggers every time you push code to the 'main' branch
on:
  push:
    branches: [ main ]
  workflow_dispatch:  # <-- Add this line right here!

jobs:
  build:
    # The matrix tells GitHub to run this job twice: once on Windows, once on Mac
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest]

    steps:
    # 1. Grab your code from the repository
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Install Python on the virtual machine
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Change this if you use a different version
        
    # 3. Install your libraries and PyInstaller
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller
        # Ensure flet desktop runtime package is available so PyInstaller
        # can bundle it into the executable (prevents runtime pip install attempts)
        pip install flet-desktop || pip install flet_desktop || true

    # 4. Package the application
    - name: Build executable
      run: pyinstaller jw-obs-monitor.spec
      
    # 5. Upload the finished build so you can download it
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: JW-OBS-Monitor-${{ runner.os }}
        path: dist/